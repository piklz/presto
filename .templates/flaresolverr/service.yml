  
#---------------------------------------------------------------------#
#     FLARESOLVERR UI                                                     #
#---------------------------------------------------------------------#  
  
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    ports:
      - 8191:8191  # <Host Port>:<Container Port>
    env_file:
      - ./services/flaresolverr/flaresolverr.env   
    healthcheck:
      test: ["CMD-SHELL", "timeout 5s sh -c 'cat < /dev/null > /dev/tcp/127.0.0.1/8191' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      private_network:
        ipv4_address: 172.19.0.54 # internal address of hiemdall
    restart: unless-stopped